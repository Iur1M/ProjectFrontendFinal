<div class="home">
  <div class="hero">
    <h1>Welcome to Movieverse</h1>
    <p>Discover, rate and explore the best movies</p>
    <a routerLink="/movies" class="home-btn">
      <i class="fas fa-play"></i>
      Explore Movies
    </a>
  </div>

  <div class="top-movies">
    <h2>
      <i class="fas fa-film"></i>
      Top Rated Movies
    </h2>

    <div class="movie-grid">
      <div
        class="movie-card"
        *ngFor="let movie of topMovies"
        (click)="openDetails(movie.id)"
      >
        <div
          class="poster"
          [style.backgroundImage]="'url(' + movie.posterUrl + ')'"
        ></div>

        <div class="movie-title">
          {{ movie.title }}
        </div>
      </div>
    </div>
  </div>
</div>
